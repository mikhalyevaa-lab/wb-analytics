services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped

  cron:
    build:
      context: ./docker/cron
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      APP_URL: http://app:3000
    depends_on:
      - app
    restart: unless-stopped
